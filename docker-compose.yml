services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-replace_me}
      ADMIN_IDS: ${ADMIN_IDS:-123456789}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://manik_bot:manik_bot@postgres:5432/manik_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manik_bot}
      POSTGRES_USER: ${POSTGRES_USER:-manik_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manik_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

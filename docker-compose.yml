services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && manik-bot"
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-replace_me}
      ADMIN_IDS: ${ADMIN_IDS:-123456789}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://manik_bot:manik_bot@postgres:5432/manik_bot}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manik_bot}
      POSTGRES_USER: ${POSTGRES_USER:-manik_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manik_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
